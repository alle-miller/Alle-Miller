<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Alle Miller</title>
    <link rel="stylesheet" href="portfolio-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Satisfy&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- NAVIGATION -->
    <nav class="navbar">
        <div class="nav-container">
            <h1 class="nav-logo">Alle Miller</h1>
            <ul class="nav-menu">
                <li class="nav-item"><a href="home.html" class="nav-link">Home</a></li>
                <li class="nav-item"><a href="about.html" class="nav-link">About</a></li>
                <li class="nav-item"><a href="work.html" class="nav-link">Work</a></li>
                <li class="nav-item"><a href="contact.html" class="nav-link active">Contact</a></li>
            </ul>
        </div>
    </nav>

    <!-- CONTACT SECTION -->
    <section class="contact-section">
        <div class="contact-container">
            <h1 class="section-title">Contact Me</h1>
            
            <div class="contact-content">
                <p class="contact-intro">Let's work together! Feel free to get in touch with any inquiries.</p>
                
                <form class="contact-form">
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required>
                    </div>

                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" rows="6" required></textarea>
                    </div>

                    <button type="submit" class="submit-btn">Send Message</button>
                </form>
            </div>
        </div>
    </section>

    <!-- FOOTER -->
    <footer class="footer">
        <p>&copy; 2024 Alle Miller. All rights reserved.</p>
    </footer>

    <script src="portfolio-script.js"></script>
</body>
</html>
